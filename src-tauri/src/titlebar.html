<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f7f7f5;
    border-bottom: 1px solid rgba(26,26,26,0.06);
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-left: 12px;
    padding-right: 4px;
    user-select: none;
    overflow: hidden;
    font-family: Georgia, serif;
  }
  .left {
    display: flex;
    align-items: center;
    gap: 7px;
    -webkit-app-region: drag;
    flex: 1;
    height: 100%;
  }
  .left img {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    opacity: 0.8;
  }
  .left span {
    font-size: 9px;
    letter-spacing: 0.22em;
    color: #c0c0bc;
    text-transform: uppercase;
  }
  .right {
    display: flex;
    -webkit-app-region: no-drag;
  }
  button {
    background: transparent;
    border: none;
    width: 40px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
    padding: 0;
    border-radius: 0;
  }
  button:hover { background: rgba(26,26,26,0.05); }
  #btn-close:hover { background: rgba(224,92,92,0.12); }
</style>

    <button id="btn-close">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">

  <script>
